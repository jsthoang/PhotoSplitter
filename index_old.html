
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #app { padding: 1.25rem 0; }
  .section { margin-bottom: 1.5rem; }
  .label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .drop-zone {
    border: 1.5px dashed var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    background: var(--color-background-secondary);
    transition: background 0.15s;
  }
  .drop-zone:hover { background: var(--color-background-tertiary); }
  .drop-zone p { font-size: 14px; color: var(--color-text-secondary); margin-top: 6px; }
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .ctrl-card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 12px;
  }
  .ctrl-card .label { margin-bottom: 8px; }
  .num-row { display: flex; align-items: center; gap: 6px; }
  .num-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    cursor: pointer; font-size: 16px; font-weight: 500;
    color: var(--color-text-primary);
    display: flex; align-items: center; justify-content: center;
  }
  .num-btn:hover { background: var(--color-background-tertiary); }
  .num-val { font-size: 18px; font-weight: 500; min-width: 24px; text-align: center; color: var(--color-text-primary); }
  select {
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    font-size: 14px;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    width: 100%;
  }
  #preview-wrap {
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 200px;
  }
  #preview-canvas { display: block; max-width: 100%; border-radius: 4px; }
  .dl-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary); font-size: 14px; cursor: pointer;
    font-family: var(--font-sans);
  }
  .dl-btn:hover { background: var(--color-background-secondary); }
  .dl-btn.primary {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }
  .dl-btn.primary:hover { opacity: 0.85; }
  #info { font-size: 13px; color: var(--color-text-secondary); }
  .tag { display: inline-block; background: var(--color-background-info); color: var(--color-text-info); font-size: 12px; padding: 2px 8px; border-radius: 20px; }
</style>

<div id="app">
  <h2 class="sr-only">Photo Splitter — split any image into a grid with no quality loss</h2>

  <div class="section">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5" style="margin: 0 auto; display:block;">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
      </svg>
      <p>Click or drop an image here</p>
      <p style="font-size:12px; margin-top:4px;">PNG, JPG, WEBP — original quality preserved</p>
    </div>
    <input type="file" id="file-in" accept="image/*" style="display:none">
  </div>

  <div class="section controls">
    <div class="ctrl-card">
      <div class="label">Columns</div>
      <div class="num-row">
        <button class="num-btn" onclick="change('col',-1)">−</button>
        <span class="num-val" id="col-val">2</span>
        <button class="num-btn" onclick="change('col',1)">+</button>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="label">Rows</div>
      <div class="num-row">
        <button class="num-btn" onclick="change('row',-1)">−</button>
        <span class="num-val" id="row-val">1</span>
        <button class="num-btn" onclick="change('row',1)">+</button>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="label">Aspect ratio per tile</div>
      <select id="ratio-sel" onchange="drawPreview()">
        <option value="free">Free (auto)</option>
        <option value="1:1">1:1 Square</option>
        <option value="4:3">4:3</option>
        <option value="3:4">3:4 Portrait</option>
        <option value="16:9">16:9 Wide</option>
        <option value="9:16">9:16 Tall</option>
        <option value="3:2">3:2</option>
        <option value="2:3">2:3</option>
      </select>
    </div>
  </div>

  <div class="section" id="preview-wrap">
    <canvas id="preview-canvas"></canvas>
  </div>

  <div class="section row" id="actions" style="display:none;">
    <span id="info"></span>
    <button class="dl-btn primary" onclick="downloadAll()">Download all tiles</button>
  </div>
</div>

<script>
let img = null, cols = 2, rows = 1;

const dropZone = document.getElementById('drop-zone');
const fileIn   = document.getElementById('file-in');
const previewWrap = document.getElementById('preview-wrap');
const previewCanvas = document.getElementById('preview-canvas');
const ctx = previewCanvas.getContext('2d');
const actions = document.getElementById('actions');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = 'var(--color-background-tertiary)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.background = ''; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.background = ''; handleFile(e.dataTransfer.files[0]); });
fileIn.addEventListener('change', () => handleFile(fileIn.files[0]));

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const i = new Image();
  i.onload = () => { img = i; drawPreview(); };
  i.src = url;
}

function change(which, delta) {
  if (which === 'col') { cols = Math.max(1, Math.min(10, cols + delta)); document.getElementById('col-val').textContent = cols; }
  else { rows = Math.max(1, Math.min(10, rows + delta)); document.getElementById('row-val').textContent = rows; }
  drawPreview();
}

function getTileDims() {
  if (!img) return { tw: 0, th: 0 };
  const ratio = document.getElementById('ratio-sel').value;
  if (ratio === 'free') return { tw: img.width / cols, th: img.height / rows };
  const [rw, rh] = ratio.split(':').map(Number);
  const tw = img.width / cols;
  const th = tw * rh / rw;
  return { tw, th };
}

function drawPreview() {
  if (!img) return;
  previewWrap.style.display = 'flex';
  actions.style.display = 'flex';

  const { tw, th } = getTileDims();
  const totalW = tw * cols, totalH = th * rows;

  const maxW = 600;
  const scale = Math.min(maxW / totalW, 400 / totalH, 1);
  const dispW = Math.round(totalW * scale), dispH = Math.round(totalH * scale);

  previewCanvas.width = dispW;
  previewCanvas.height = dispH;

  ctx.clearRect(0, 0, dispW, dispH);
  ctx.drawImage(img,
    (img.width - totalW) / 2, (img.height - totalH) / 2, totalW, totalH,
    0, 0, dispW, dispH);

  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);

  for (let c = 1; c < cols; c++) {
    const x = Math.round(c * dispW / cols);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, dispH); ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    const y = Math.round(r * dispH / rows);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(dispW, y); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 3]);
  for (let c = 1; c < cols; c++) {
    const x = Math.round(c * dispW / cols);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, dispH); ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    const y = Math.round(r * dispH / rows);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(dispW, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  const tw2 = Math.round(tw), th2 = Math.round(th);
  document.getElementById('info').textContent = cols * rows + ' tiles · each ' + tw2 + '×' + th2 + 'px';
}

function downloadAll() {
  if (!img) return;
  const { tw, th } = getTileDims();
  const totalW = tw * cols, totalH = th * rows;
  const srcX0 = (img.width - totalW) / 2, srcY0 = (img.height - totalH) / 2;

  const offscreen = document.createElement('canvas');
  offscreen.width = Math.round(tw);
  offscreen.height = Math.round(th);
  const oc = offscreen.getContext('2d');

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      oc.clearRect(0, 0, offscreen.width, offscreen.height);
      oc.drawImage(img, srcX0 + c * tw, srcY0 + r * th, tw, th, 0, 0, offscreen.width, offscreen.height);
      const link = document.createElement('a');
      link.download = 'tile_r' + (r+1) + '_c' + (c+1) + '.png';
      link.href = offscreen.toDataURL('image/png');
      link.click();
    }
  }
}
</script>
